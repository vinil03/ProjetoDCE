<ion-header>
  <ion-navbar>
    <ion-title>DCE Associado Checker</ion-title>
  </ion-navbar>
</ion-header>

<ion-content padding>
  <!-- <div class="Imagem" id="Imagem">
    <img src="assets/imgs/DCEcoloridoPNG.png" />
  </div> -->

  <div class="LerCodigo" id="CodB">
    <ion-icon (click)= "launchReader()" name="md-barcode"  id="CodBarras"></ion-icon>
    <!-- <button ion-button (click)="launchReader()"> Ler código de barras</button> -->
  </div>
  <div class= "legendaImagem" id="Leg">
      <h4>Ler código de barras</h4>
  </div>
  
  <div class="InputCodigo" id="CodIn">
      <ion-icon (click)= "showPrompt()" name="md-keypad" id="CodInput"></ion-icon>
      <!-- <button ion-button (click)="showPrompt()">Digitar RA</button> -->
  </div>
  <div class= "legendaImagem" id="Leg">
      <h4>Digitar RA</h4>
  </div>

  <div class="Verifica" id="Verificacao">
    <div *ngIf="queryCreated==true">
      <div *ngIf="checkRA(); then thenBlock else elseBlock"></div>
      <ng-template #thenBlock>
        <div class="EstadoASS" id="EstadoASS">
          Associado
        </div>
        <div class="Nome" id="Nome">
          {{query.name}}
        </div>
        <div class="RA" id="RA">
          {{query.RA}}
        </div>
      </ng-template>
      <ng-template #elseBlock>
        <div class="EstadoNASS" id="EstadoNASS">
          Não Associado
        </div>
        <div class="RA" id="RA">
          {{query.RA}}
        </div>
      </ng-template>
    </div>
  </div>
  <div class="Login-button">
      <button ion-button (click)="lista()">Lista</button>
  </div>
</ion-content>
