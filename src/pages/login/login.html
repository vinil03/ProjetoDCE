  <ion-navbar>
    <ion-title>Login</ion-title>
  </ion-navbar>

  <ion-content padding>
  <div class="logo" id="logo">
      <img src="assets/imgs/DCEcoloridoPNG.png"/>
  </div>
  <form [formGroup]="loginForm" novalidate>
  <ion-list>
       <ion-item>
         <ion-label floating>Email</ion-label>
         <ion-input formControlName="email" type="email" [class.invalid]="!loginForm.controls.email.valid && blur"></ion-input>
       </ion-item>
     
       <ion-item>
         <ion-label floating>Senha</ion-label>
         <ion-input formControlName="password" type="password" [class.invalid]="!loginForm.controls.password.valid && blur"></ion-input>
       </ion-item>      
    
       <div class="Login-button">
          <button ion-button (click)="verifyUser()" [disabled]="!loginForm.valid">Login </button>
      </div>
      <div class="Sem-login-Senha">
        <button ion-button outline (click)= "createLogin()"> Não tenho Login </button>
        <button ion-button outline (click)= "resetPassword()"> Esqueci a senha </button>
      </div>

      <div class="Facebook-login" id="FG-log">

        <ion-icon (click)= "verifyUser_FB()" name="logo-facebook"  id="Facebook"></ion-icon>
        <!-- <button ion-button (click)= "verifyUser_FB()"> Login com Facebook </button> -->

        <ion-icon (click)= "verifyUser_G()" name="logo-google"  id="Google"></ion-icon>
        <!-- <button ion-button (click)= "verifyUser_G()"> Login com Google </button> -->
      </div>

  </ion-list>
</form>
</ion-content>
