<ion-header>

  <ion-navbar>
    <ion-title>Histórico</ion-title>
  </ion-navbar>

</ion-header>


<ion-content>

  <div *ngIf="hasQueryList">
    <ion-list>
      <div class="Lista" id="Lista" ion-item *ngFor="let dado of query.items">
        <ion-item>
          <h2>{{dado.getName()}}</h2>
          <h3>{{dado.getRA()}}</h3>
          <!-- <p>{{query.getItem(0).getCourse()}}</p> -->
        </ion-item>
      </div>
    </ion-list>
  </div>
</ion-content>
